name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate JSON files
        run: |
          for f in $(find . -name '*.json' -not -path '*/.git/*'); do
            echo "Checking $f"
            python3 -m json.tool "$f" > /dev/null
          done

      - name: Lint shell scripts
        run: |
          sudo apt-get install -y shellcheck
          find claude-teams-brain/scripts -name '*.sh' | xargs shellcheck --severity=warning

      - name: Check Node.js entry point
        run: node --check claude-teams-brain/start.mjs

      - name: Validate Python engine syntax
        run: python3 -m py_compile claude-teams-brain/scripts/brain_engine.py

      - name: Check package version consistency
        run: |
          PKG=$(node -p "require('./claude-teams-brain/package.json').version")
          PLUGIN=$(node -p "require('./claude-teams-brain/.claude-plugin/plugin.json').version")
          if [ "$PKG" != "$PLUGIN" ]; then
            echo "Version mismatch: package.json=$PKG, plugin.json=$PLUGIN"
            exit 1
          fi
          echo "Version: $PKG ✓"
